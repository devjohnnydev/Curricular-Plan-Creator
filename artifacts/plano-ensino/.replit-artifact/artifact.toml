kind = "web"
previewPath = "/"
title = "Plano de Ensino - SENAI Morvan Figueiredo"
version = "1.0.0"
id = "artifacts/plano-ensino"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24861

[services.development]
run = "pnpm --filter @workspace/plano-ensino run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plano-ensino", "run", "build" ]
publicDir = "artifacts/plano-ensino/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24861"
BASE_PATH = "/"
